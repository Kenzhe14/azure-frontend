<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background: #f4f7f6;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #preview {
            max-width: 100%;
            margin-top: 15px;
            border-radius: 5px;
            display: none;
        }

        .result-item {
            text-align: left;
            background: #eef2f3;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .loading {
            display: none;
            color: #0078d4;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Анализатор лиц </h2>
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="preview" src="" alt="Preview">
        <br><br>
        <button onclick="upload()" id="uploadBtn">Проанализировать фото</button>

        <div id="loader" class="loading">Обработка нейросетями AWS...</div>
        <div id="results"></div>
    </div>

    <script>
        function previewImage() {
            const file = document.getElementById('imageInput').files[0];
            const preview = document.getElementById('preview');
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        }

        async function upload() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return alert("Выберите файл!");

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            // Показываем лоадер
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').innerHTML = '';

            try {
                const response = await fetch('https://analystapp-becagvgvgubnh5hr.canadacentral-01.azurewebsites.net/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                alert("Ошибка при связи с Azure: " + error);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderResults(data) {
            const container = document.getElementById('results');
            if (data.status === "success" && data.faces_detected > 0) {
                container.innerHTML = `<h3>Найдено лиц: ${data.faces_detected}</h3>`;

                data.details.forEach((face, index) => {
                    const emotion = face.Emotions.reduce((prev, current) => (prev.Confidence > current.Confidence) ? prev : current);

                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                    <strong>Лицо №${index + 1}</strong><br>
                    • Эмоция: ${emotion.Type} (${Math.round(emotion.Confidence)}%)<br>
                    • Возраст: ~${face.AgeRange.Low} - ${face.AgeRange.High} лет<br>
                    • Очки: ${face.Eyeglasses.Value ? "Да" : "Нет"}
                `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = "<p>Лица не обнаружены или произошла ошибка.</p>";
            }
        }
    </script>

</body>

</html>
